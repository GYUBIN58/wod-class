  wrap.innerHTML=`<div class="tf" style="font-size:21px;margin-bottom:2px">📈 성장 그래프</div>
    <div style="color:var(--muted);font-size:10px;margin-bottom:12px">${isInd?S.user?.name:S.user?.team}의 WOD별 기록</div>`;
  if(my.length===0){wrap.innerHTML+='<div style="text-align:center;color:var(--muted);padding:32px"><div style="font-size:40px">📈</div><div style="margin-top:7px">기록이 쌓이면 표시됩니다!</div></div>';return wrap;}

  // WOD별 그룹핑
  const wodGroups={};
  my.forEach(r=>{
    const key=r.wodTitle||'기타';
    if(!wodGroups[key])wodGroups[key]=[];
    wodGroups[key].push(r);
  });

  Object.entries(wodGroups).forEach(([wodTitle,recs])=>{
    const wodType=recs[0].wodType;
    const c=mkDiv('card','margin-bottom:12px;border:1px solid #f9731620');

    if(wodType==='AMRAP'){
      const maxS=Math.max(...recs.map(r=>r.sets));
      c.innerHTML=`<div style="font-weight:700;font-size:13px;margin-bottom:2px">${wodTitle}</div>
        <div style="display:flex;gap:4px;margin-bottom:8px"><span class="badge bo">AMRAP</span></div>

        <div style="display:flex;gap:4px;align-items:flex-end;height:68px">
          ${recs.slice(-10).map(r=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px">
            <div style="font-size:8px;color:var(--accent);font-weight:700">${r.sets}</div>
            <div style="width:100%;border-radius:3px 3px 0 0;background:linear-gradient(var(--accent),#ea580c);height:${maxS>0?(r.sets/maxS)*55:3}px;min-height:3px"></div>
            <div style="font-size:7px;color:var(--muted)">${fmtDate(r.date)}</div>
          </div>`).join('')}
        </div>
        <div style="margin-top:8px;display:flex;gap:6px">
          <div style="flex:1;background:var(--card2);border-radius:8px;padding:7px;text-align:center">
            <div style="font-size:18px;font-weight:900;color:var(--accent)">${Math.max(...recs.map(r=>r.sets))}</div>
            <div style="font-size:9px;color:var(--muted)">최고 세트</div>

          <div style="flex:1;background:var(--card2);border-radius:8px;padding:7px;text-align:center">
            <div style="font-size:18px;font-weight:900;color:var(--green)">${recs.length}</div>
            <div style="font-size:9px;color:var(--muted)">총 횟수</div>

    } else if(wodType==='EMOM'){
      const maxR=Math.max(...recs.map(r=>r.sets||0));
      c.innerHTML=`<div style="font-weight:700;font-size:13px;margin-bottom:2px">${wodTitle}</div>
        <div style="display:flex;gap:4px;margin-bottom:8px"><span class="badge bg">EMOM</span></div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px">완료 라운드 변화</div>
        <div style="display:flex;gap:4px;align-items:flex-end;height:68px">
          ${recs.slice(-10).map(r=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px">
            <div style="font-size:8px;color:var(--green);font-weight:700">${r.sets||0}R</div>
            <div style="width:100%;border-radius:3px 3px 0 0;background:linear-gradient(var(--green),#16a34a);height:${maxR>0?((r.sets||0)/maxR)*55:3}px;min-height:3px"></div>
            <div style="font-size:7px;color:var(--muted)">${fmtDate(r.date)}</div>
          </div>`).join('')}
        </div>
        <div style="margin-top:8px;display:flex;gap:6px">
          <div style="flex:1;background:var(--card2);border-radius:8px;padding:7px;text-align:center">
            <div style="font-size:18px;font-weight:900;color:var(--green)">${maxR}R</div>
            <div style="font-size:9px;color:var(--muted)">최고 라운드</div>
          </div>
          <div style="flex:1;background:var(--card2);border-radius:8px;padding:7px;text-align:center">
            <div style="font-size:18px;font-weight:900;color:var(--green)">${recs.length}</div>
            <div style="font-size:9px;color:var(--muted)">총 횟수</div>
          </div>
        </div>`;
    } else {
      const maxT=Math.max(...recs.map(r=>r.time));
      const minT=Math.min(...recs.map(r=>r.time));
      c.innerHTML=`<div style="font-weight:700;font-size:13px;margin-bottom:2px">${wodTitle}</div>
        <div style="display:flex;gap:4px;margin-bottom:8px"><span class="badge bb">${wodType}</span></div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px">완료 시간 변화 (낮을수록 빠름)</div>
        <div style="display:flex;gap:4px;align-items:flex-end;height:68px">
          ${recs.slice(-10).map(r=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px">
            <div style="font-size:7px;color:var(--blue);font-weight:700">${fmtTime(r.time)}</div>
            <div style="width:100%;border-radius:3px 3px 0 0;background:linear-gradient(var(--blue),#2563eb);height:${maxT>0?(r.time/maxT)*55:3}px;min-height:3px"></div>
            <div style="font-size:7px;color:var(--muted)">${fmtDate(r.date)}</div>
          </div>`).join('')}

        <div style="margin-top:8px;display:flex;gap:6px">

            <div style="font-size:15px;font-weight:900;color:var(--blue)">${fmtTime(minT)}</div>
            <div style="font-size:9px;color:var(--muted)">최고 기록</div>
          </div>
          <div style="flex:1;background:var(--card2);border-radius:8px;padding:7px;text-align:center">
            <div style="font-size:18px;font-weight:900;color:var(--green)">${recs.length}</div>
            <div style="font-size:9px;color:var(--muted)">총 횟수</div>
          </div>
        </div>`;
    }
    wrap.appendChild(c);
  });

  // 전체 요약
  wrap.appendChild(mkDiv('card','',`<div style="font-weight:700;font-size:12px;margin-bottom:6px">📊 전체 요약</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
      <div style="background:var(--card2);border-radius:8px;padding:8px;text-align:center"><div style="font-size:20px;font-weight:900;color:var(--accent)">${my.length}</div><div style="color:var(--muted);font-size:10px">총 운동 횟수</div></div>
      <div style="background:var(--card2);border-radius:8px;padding:8px;text-align:center"><div style="font-size:20px;font-weight:900;color:var(--green)">${Object.keys(wodGroups).length}</div><div style="color:var(--muted);font-size:10px">참여 WOD 수</div></div>
    </div>`));
  return wrap;
}

// ── 관리자: WOD 설정 ──
function buildAdminWod(){
  const wrap=mkDiv('','display:flex;flex-direction:column;gap:10px');
  const tid=S.user?.teacherId;
  const wodList=getWodList(tid);
  const activeIds=getActiveWodIds(tid);

  // WOD 목록 관리
  const listCard=mkDiv('card','border:1px solid #f9731630');
  listCard.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div style="font-weight:700;font-size:13px">📋 WOD 목록 (${wodList.length}개)</div>
  </div>`;

  if(wodList.length===0){
    listCard.innerHTML+=`<div style="text-align:center;color:var(--muted);font-size:12px;padding:14px 0">등록된 WOD가 없습니다.<br>아래에서 새 WOD를 만들어보세요!</div>`;
  } else {
    wodList.forEach((w,i)=>{
      const isActive=activeIds.includes(w.id);
      const tl=w.timeLimit||(w.timeLimitMin||10)*60+(w.timeLimitSec||0);
      const row=mkDiv('','background:var(--card2);border-radius:10px;padding:10px;margin-bottom:6px;border:1px solid '+(isActive?'var(--green)':'var(--border)'));
      row.innerHTML=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <div style="flex:1;font-weight:700;font-size:12px">${w.title}</div>
        <span class="badge bo">${w.type}</span>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:7px">${w.type==='AMRAP'?fmtTime(tl)+' AMRAP':w.type==='EMOM'?(w.emomRounds||w.exercises.length)+'분 EMOM':w.targetSets+'세트 For Time'} · ${w.teamMode==='individual'?'개인전':'팀전'}</div>`;

      const btnRow=mkDiv('','display:flex;gap:5px;flex-wrap:wrap');
      // 공개/비공개 토글
      const toggleBtn=mkBtn(isActive?'btn-g':'btn-s',`flex:1;font-size:11px;padding:7px`,isActive?'✅ 공개중':'비공개',()=>{
        let ids=[...getActiveWodIds(tid)];
        if(isActive) ids=ids.filter(id=>id!==w.id);
        else ids=[...ids,w.id];
        setActiveWodIds(tid,ids);
        fbSaveActiveWodIds(tid,ids);
        showToast(isActive?'비공개로 변경됨':'공개로 변경됨');
        render();
      });
      btnRow.appendChild(toggleBtn);
      // 시뮬레이션 버튼
      btnRow.appendChild(mkBtn('btn-b',`flex:1;font-size:11px;padding:7px`,'▶ 시뮬레이션',()=>{
        _simWodCache=w;
        setState({adminWodSimId:w.id,screen:'wodSim',simData:null,simSlide:0,simPlaying:false,simFromStudent:false});
      }));
      const btnRow2=mkDiv('','display:flex;gap:5px;margin-top:5px');
      // 편집 버튼
      btnRow2.appendChild(mkBtn('btn-s',`flex:1;font-size:11px;padding:7px`,'✏️ 편집',()=>{
        setState({
          adminWod:{...w,exercises:[...(w.exercises||[])],exerciseDescs:[...(w.exerciseDescs||[])]},
          adminWodEditId:w.id
        });
      }));
      // 삭제 버튼
      btnRow2.appendChild(mkBtn('btn-d',`width:38px;font-size:11px;padding:7px;border-radius:10px`,ic.trash,()=>{
        const newList=wodList.filter(x=>x.id!==w.id);
        const newIds=activeIds.filter(id=>id!==w.id);
        setWodList(tid,newList);
        setActiveWodIds(tid,newIds);
        fbSaveWodList(tid,newList);
        fbSaveActiveWodIds(tid,newIds);
        showToast('WOD 삭제됨');
        render();
      }));
      row.appendChild(btnRow);
      row.appendChild(btnRow2);
      listCard.appendChild(row);
    });
  }

  // 새 WOD 만들기 버튼
  listCard.appendChild(mkBtn('btn-p','margin-top:6px','+ 새 WOD 만들기',()=>{
    setState({adminWod:{...DEFAULT_WOD,id:'',title:'새 WOD'},adminWodEditId:'new'});
  }));
  wrap.appendChild(listCard);

  // WOD 편집 폼 (편집 중일 때만 표시)
  if(S.adminWodEditId){
    wrap.appendChild(buildAdminWodForm());
  }

  return wrap;
}

function syncAdminWodInputs(){
  if(!S.adminWod) return;
  const titleInp=document.querySelector('#admin-wod-title');
  if(titleInp) S.adminWod.title=titleInp.value;

  // 운동 목록 - DOM에서 직접 읽기
  const exInps=document.querySelectorAll('.admin-ex-inp');
  if(exInps.length>0){
    // DOM 인풋 수만큼 exercises 배열 맞춤
    S.adminWod.exercises=Array.from(exInps).map(inp=>inp.value||'');
  }

  // 운동 설명
  const descTas=document.querySelectorAll('.admin-ex-desc');
  if(descTas.length>0){
    if(!S.adminWod.exerciseDescs) S.adminWod.exerciseDescs=[];
    descTas.forEach((ta,i)=>{ S.adminWod.exerciseDescs[i]=ta.value; });
  }

  const minInp=document.querySelector('#admin-wod-min');
  const secInp=document.querySelector('#admin-wod-sec');
  if(minInp) S.adminWod.timeLimitMin=Math.max(0,+minInp.value);
  if(secInp) S.adminWod.timeLimitSec=Math.min(59,Math.max(0,+secInp.value));
  if(minInp||secInp) S.adminWod.timeLimit=(S.adminWod.timeLimitMin||0)*60+(S.adminWod.timeLimitSec||0);

  const setsInp=document.querySelector('#admin-wod-sets');
  if(setsInp) S.adminWod.targetSets=Math.max(1,+setsInp.value);

  const roundsInp=document.querySelector('#admin-wod-rounds');
  if(roundsInp) S.adminWod.emomRounds=Math.max(1,+roundsInp.value);
}

    const c4=mkDiv('card','');
    c4.innerHTML=`<div style="font-weight:700;font-size:13px;margin-bottom:7px">총 라운드 수 (분)</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:9px">운동 목록이 ${aw.exercises?.length||0}개면 자동으로 ${aw.exercises?.length||0}분 EMOM이 됩니다. 더 길게 하려면 늘려주세요.</div>`;
    const ri=mkInp('inp',{type:'number',value:aw.emomRounds||aw.exercises?.length||3,id:'admin-wod-rounds'},v=>{S.adminWod.emomRounds=Math.max(1,+v);});
    ri.style.cssText='font-size:28px;font-weight:900;text-align:center';
    c4.appendChild(ri);
    c4.innerHTML+=`<div style="margin-top:8px;text-align:center;color:var(--accent);font-size:13px;font-weight:700">= ${aw.emomRounds||aw.exercises?.length||3}분 EMOM</div>`;
    wrap.appendChild(c4);
  } else {
    const c4=mkDiv('card','');
    c4.innerHTML='<div style="font-weight:700;font-size:13px;margin-bottom:7px">목표 세트 수</div>';
    const si=mkInp('inp',{type:'number',value:aw.targetSets||3,id:'admin-wod-sets'},v=>{S.adminWod.targetSets=Math.max(1,+v);});
    wrap.appendChild(c4);
    c4.appendChild(si);
  }

  // 운동 목록
  const c5=mkDiv('card','');
  c5.innerHTML='<div style="font-weight:700;font-size:13px;margin-bottom:9px">운동 목록</div>';
  (aw.exercises||[]).forEach((ex,i)=>{
    const row=mkDiv('','margin-bottom:10px;background:var(--card2);border-radius:10px;padding:8px');
    const nameWrap=mkDiv('','display:flex;gap:4px;flex:1;align-items:center');
    const ei=mkInp('inp',{type:'text',value:ex,placeholder:'운동 이름'},v=>{
      if(!S.adminWod) return;
      S.adminWod.exercises[i]=v;
    });
    ei.className='inp admin-ex-inp';
    ei.style.flex='1';
    nameWrap.appendChild(ei);
    nameWrap.appendChild(mkBtn('','background:none;border:none;color:var(--red);padding:4px',ic.trash,()=>{
      syncAdminWodInputs();
      S.adminWod.exercises.splice(i,1);
      if(!S.adminWod.exerciseDescs) S.adminWod.exerciseDescs=[];
      S.adminWod.exerciseDescs.splice(i,1);
      render();
    }));
    const rowHeader=mkDiv('','display:flex;gap:4px;align-items:center;margin-bottom:5px');
    rowHeader.innerHTML=`<span style="color:var(--accent);font-weight:700;min-width:18px;font-size:11px">${i+1}.</span>`;
    rowHeader.appendChild(nameWrap);
    row.appendChild(rowHeader);
    // 운동 설명 입력
    const descLabel=mkDiv('','font-size:10px;color:var(--muted);margin-bottom:3px','💡 운동 설명 (시뮬레이션에 표시됨)');
    const di=document.createElement('textarea');
    di.className='inp admin-ex-desc';
    di.placeholder='예) 엎드려서 팔굽혀펴기 자세 → 팔을 구부렸다 펴기 → 10회 반복';
    di.value=(aw.exerciseDescs||[])[i]||'';
    di.style.cssText='width:100%;height:60px;resize:none;font-size:11px;line-height:1.5';
    di.oninput=function(){
      if(!S.adminWod.exerciseDescs) S.adminWod.exerciseDescs=[];
      S.adminWod.exerciseDescs[i]=this.value;
    };
    row.appendChild(descLabel);
    row.appendChild(di);
    c5.appendChild(row);
  });
  const addRow=mkDiv('','display:flex;gap:4px;margin-top:4px');
  const newExInp=mkInp('inp',{type:'text',placeholder:'운동 추가',value:S.adminNewEx||''},v=>{S.adminNewEx=v;});
  newExInp.addEventListener('keydown',e=>{if(e.key==='Enter'&&S.adminNewEx?.trim()){syncAdminWodInputs();S.adminWod.exercises=[...(S.adminWod.exercises||[]),S.adminNewEx.trim()];S.adminNewEx='';render();}});
  addRow.appendChild(newExInp);
  addRow.appendChild(mkBtn('btn-g','width:42px;border-radius:10px',ic.plus,()=>{if(S.adminNewEx?.trim()){syncAdminWodInputs();S.adminWod.exercises=[...(S.adminWod.exercises||[]),S.adminNewEx.trim()];S.adminNewEx='';render();}}));
  c5.appendChild(addRow);
  wrap.appendChild(c5);

  // 저장
  const saveBtnRow=mkDiv('','display:flex;gap:6px');
  saveBtnRow.appendChild(mkBtn('btn-p','flex:1','💾 WOD 저장',()=>{
    syncAdminWodInputs();
    console.log('저장 직전 exercises:', JSON.stringify(S.adminWod.exercises));
    const isNew=S.adminWodEditId==='new';
    const saved={...S.adminWod,id:isNew?Date.now().toString():S.adminWod.id,date:new Date().toISOString().slice(0,10)};
    saved.timeLimit=(saved.timeLimitMin||0)*60+(saved.timeLimitSec||0);
    if(!saved.title?.trim()){showToast('WOD 제목을 입력해주세요','error');return;}
    if(!saved.exercises?.length){showToast('운동을 최소 1개 이상 추가해주세요','error');return;}
    const list=getWodList(tid);
    if(isNew){
      list.push(saved);
    } else {
      const idx=list.findIndex(w=>w.id===saved.id);
      if(idx>=0) list[idx]=saved; else list.push(saved);
    }
    setWodList(tid,list);
    // 공개 목록도 Firebase에 동기화
    const currentActiveIds=getActiveWodIds(tid);
    // 새 WOD면 자동으로 공개 목록에 추가
    let newActiveIds=currentActiveIds;
    if(isNew && !currentActiveIds.includes(saved.id)){
      newActiveIds=[...currentActiveIds, saved.id];
      setActiveWodIds(tid, newActiveIds);
    }
    fbSaveWodList(tid,list).then(()=>{
      return fbSaveActiveWodIds(tid, newActiveIds);
    }).then(()=>{
      showToast('WOD 저장 완료! ✅ Firebase에 동기화됨');
    }).catch(()=>{
      showToast('로컬 저장됨 (Firebase 동기화 실패 - 인터넷 확인)','error');
    });
    S.adminWod=null;
    S.adminWodEditId=null;
    render(); // ← 저장 후 즉시 목록 갱신
  }));
  saveBtnRow.appendChild(mkBtn('btn-s','flex:0.4;font-size:12px','취소',()=>{
    S.adminWod=null;
    S.adminWodEditId=null;
    render();
  }));
  wrap.appendChild(saveBtnRow);
  return wrap;
}

// ── 관리자: 담당 반 설정 ──
function buildAdminClasses(){
  const tid=S.user?.teacherId;
  if(!S.adminClassList)S.adminClassList=[...getTeacherClasses(tid)||[]];
  const wrap=mkDiv('','display:flex;flex-direction:column;gap:10px');

  const info=mkDiv('card','');
  info.innerHTML=`<div style="font-weight:700;font-size:13px;margin-bottom:7px">내 담당 반 설정</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:11px">선택한 반만 학생 로그인 화면에 표시됩니다. 선택하지 않으면 전체 반이 표시됩니다.</div>`;

  // 학년 탭
  const gradeTabRow=mkDiv('','display:flex;gap:6px;margin-bottom:9px');
  ['2학년','3학년'].forEach((g,gi)=>{
    const grade=gi===0?'2':'3';
    const isOn=(S.adminClassGrade||'2')===grade;
    gradeTabRow.appendChild(mkBtn(`chip ${isOn?'on':''}`,`flex:1;font-size:12px;padding:8px`,g,()=>{S.adminClassGrade=grade;render();}));
  });
  info.appendChild(gradeTabRow);

  const showClasses=(S.adminClassGrade||'2')==='2'?CLASSES_2:CLASSES_3;
  const grid=mkDiv('','display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:11px');
  showClasses.forEach(c=>{
    const on=(S.adminClassList||[]).includes(c);
    grid.appendChild(mkBtn(`chip ${on?'on':''}`,`font-size:11px;padding:8px 3px`,c,()=>{
      if(!S.adminClassList)S.adminClassList=[];
      if(S.adminClassList.includes(c))S.adminClassList=S.adminClassList.filter(x=>x!==c);
      else S.adminClassList=[...S.adminClassList,c];
      render();
    }));
  });
  info.appendChild(grid);

  // 전체 선택 / 해제
  const row=mkDiv('','display:flex;gap:6px;margin-bottom:11px');
  row.appendChild(mkBtn('btn-s','flex:1;font-size:12px;padding:9px','이 학년 전체 선택',()=>{
    const grade=S.adminClassGrade||'2';
    const gradeList=grade==='2'?CLASSES_2:CLASSES_3;
    const current=S.adminClassList||[];
    S.adminClassList=[...new Set([...current,...gradeList])];
    render();
  }));
  row.appendChild(mkBtn('btn-s','flex:1;font-size:12px;padding:9px','이 학년 전체 해제',()=>{
    const grade=S.adminClassGrade||'2';
    S.adminClassList=(S.adminClassList||[]).filter(c=>!c.startsWith(grade+'-'));
    render();
  }));
  info.appendChild(row);

  info.appendChild(mkBtn('btn-p','','💾 담당 반 저장',()=>{
    setTeacherClasses(tid,S.adminClassList||[]);
    fbSaveClasses(tid,S.adminClassList||[]); // Firebase 동기화
    showToast('담당 반이 저장되었습니다! ✅');
    render();
  }));
  wrap.appendChild(info);

  const sel=S.adminClassList&&S.adminClassList.length>0?S.adminClassList:ALL_CLASSES;
  wrap.appendChild(mkDiv('card','',`<div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px">현재 학생에게 표시되는 반 (${sel.length}개)</div><div style="font-size:12px">${sel.join(', ')}</div>`));
  return wrap;
}

// ── 관리자: 기록 관리 ──
function buildAdminRecords(){
  const wrap=mkDiv('','display:flex;flex-direction:column;gap:9px');

  // 필터
  const fc=mkDiv('card','');
  fc.innerHTML='<div style="font-weight:700;font-size:13px;margin-bottom:8px">🔍 필터</div>';
  fc.innerHTML+=`<div style="color:var(--muted);font-size:10px;margin-bottom:4px">반</div>`;
  const cg=mkDiv('','display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:7px');
  [['all','전체'],...ALL_CLASSES.map(c=>[c,c])].forEach(([v,l])=>{
    cg.appendChild(mkBtn(`chip ${S.adminFilterCls===v?'on':''}`,`font-size:9px;padding:5px 1px`,l,()=>setState({adminFilterCls:v})));
  });
  fc.appendChild(cg);
  const mr=mkDiv('','display:flex;gap:4px;margin-bottom:7px');
  [['all','전체'],['individual','개인전'],['team','팀전']].forEach(([v,l])=>{
    mr.appendChild(mkBtn(`chip ${S.adminFilterMode===v?'on':''}`,`flex:1;font-size:11px`,l,()=>setState({adminFilterMode:v})));
  });
  fc.appendChild(mr);
  wrap.appendChild(fc);

  // 초기화
  const cc=mkDiv('card','');
  cc.innerHTML='<div style="font-weight:700;font-size:12px;margin-bottom:8px">기록 초기화</div>';
  const targ=mkDiv('','display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:8px');
  [['all','전체'],...ALL_CLASSES.map(c=>[c,c])].forEach(([v,l])=>{
    targ.appendChild(mkBtn(`chip ${S.adminClearTarget===v?'on':''}`,`font-size:9px;padding:4px 1px`,l,()=>setState({adminClearTarget:v,adminConfirm:false})));
  });
  cc.appendChild(targ);
  if(!S.adminConfirm){
    cc.appendChild(mkBtn('btn-d','',S.adminClearTarget==='all'?'전체 초기화':`${S.adminClearTarget} 초기화`,()=>setState({adminConfirm:true})));
  } else {
    const cf=mkDiv('','');
    cf.innerHTML='<div style="color:var(--red);font-weight:700;text-align:center;margin-bottom:6px;font-size:11px">정말 삭제하시겠습니까?</div>';
    const btnRow=mkDiv('','display:flex;gap:4px');
    btnRow.appendChild(mkBtn('btn-d','flex:1','삭제',async ()=>{
      const tid=S.user?.teacherId;
      const toDelete = S.adminClearTarget==='all'
        ? S.records.filter(r=>r.teacherId===tid)
        : S.records.filter(r=>r.teacherId===tid&&r.class===S.adminClearTarget);
      toDelete.forEach(r=>fbDeleteRecord(r.id));
      if(S.adminClearTarget==='all') S.records=S.records.filter(r=>r.teacherId!==tid);
      else S.records=S.records.filter(r=>!(r.teacherId===tid&&r.class===S.adminClearTarget));
      save();
      showToast('초기화됨');setState({adminConfirm:false});
    }));
    btnRow.appendChild(mkBtn('btn-s','flex:1','취소',()=>setState({adminConfirm:false})));
    cf.appendChild(btnRow);cc.appendChild(cf);
  }
  wrap.appendChild(cc);

  // 기록 목록
  let filtered=S.records.filter(r=>r.teacherId===S.user?.teacherId);
  if(S.adminFilterCls!=='all')filtered=filtered.filter(r=>r.class===S.adminFilterCls);
  if(S.adminFilterMode!=='all')filtered=filtered.filter(r=>r.mode===S.adminFilterMode||(S.adminFilterMode==='individual'&&!r.mode));

  // 순위순 정렬 (AMRAP: 세트 높은순, ForTime: 시간 짧은순)
  const amraps=filtered.filter(r=>r.wodType==='AMRAP');
  const emoms=filtered.filter(r=>r.wodType==='EMOM');
  const fts=filtered.filter(r=>r.wodType==='ForTime');
  amraps.sort((a,b)=>b.sets-a.sets||b.reps-a.reps||new Date(a.date)-new Date(b.date));
  emoms.sort((a,b)=>(b.sets||0)-(a.sets||0)||new Date(a.date)-new Date(b.date));
  fts.sort((a,b)=>a.time-b.time||new Date(a.date)-new Date(b.date));
  const sorted=[...amraps,...emoms,...fts];

  const medals=['🥇','🥈','🥉'];
  const lc=mkDiv('card','');
  lc.innerHTML=`<div style="font-weight:700;font-size:12px;margin-bottom:8px">기록 목록 (${sorted.length}건) · 순위순</div>`;
  if(sorted.length===0){lc.innerHTML+='<div style="text-align:center;color:var(--muted);padding:16px;font-size:12px">기록이 없습니다</div>';}
  sorted.slice(0,50).forEach((r,idx)=>{
    const hasAbn=r.checkLogs&&r.checkLogs.some(l=>l.abnormal);
    const expanded=S.adminExpandRecord===r.id;
    const rank=idx+1;
    const rankLabel=rank<=3?medals[rank-1]:rank+'위';
    const rc=mkDiv('','background:var(--card2);border-radius:8px;padding:8px;margin-bottom:6px;border:1px solid '+(hasAbn?'var(--red)':rank<=3?'var(--gold)':'var(--border)'));
    rc.innerHTML=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
      <div style="font-size:${rank<=3?16:12}px;min-width:28px;text-align:center">${rankLabel}</div>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:700">${r.class} · ${r.mode==='team'?r.team:r.name||getMembers(r)[0]||''}</div>
        <div style="font-size:10px;color:var(--muted)">${getMembers(r).join(', ')||''} · ${r.wodTitle||''}</div>
      </div>
      <div style="font-size:14px;font-weight:900;color:${r.wodType==='AMRAP'?'var(--accent)':r.wodType==='EMOM'?'var(--green)':'var(--blue)'}">${r.wodType==='AMRAP'?`${r.sets||0}S+${r.reps||0}`:r.wodType==='EMOM'?`${r.sets||0}R`:fmtTime(r.time)}</div>
      ${hasAbn?'<span style="color:var(--red);font-size:11px">⚠️</span>':''}
    </div>
    <div style="font-size:9px;color:var(--muted)">${fmtFull(r.date)}</div>`;
    const detBtn=mkBtn('','background:none;border:none;color:var(--muted);font-size:9px;margin-top:2px',expanded?'▲ 접기':'▼ 상세',()=>setState({adminExpandRecord:expanded?null:r.id}));
    rc.appendChild(detBtn);
    if(expanded){
      if(r.checkLogs&&r.checkLogs.length>0){rc.innerHTML+=`<div style="margin-top:4px;background:var(--bg);border-radius:6px;padding:5px 7px;font-size:9px"><div style="font-weight:700;margin-bottom:2px">세트 로그</div>${r.checkLogs.map(l=>`<div style="color:${l.abnormal?'var(--red)':'var(--muted)'}">Set ${l.set} · ${fmtTime(l.elapsed)}${l.abnormal?' ⚠️':''}</div>`).join('')}</div>`;}
      if(r.forTimeSetLogs&&r.forTimeSetLogs.length>0){rc.innerHTML+=`<div style="margin-top:4px;background:var(--bg);border-radius:6px;padding:5px 7px;font-size:9px"><div style="font-weight:700;margin-bottom:2px">세트 로그</div>${r.forTimeSetLogs.map(l=>`<div style="color:var(--muted)">Set ${l.set} · ${fmtTime(l.elapsed)}</div>`).join('')}</div>`;}
      rc.appendChild(mkBtn('btn-d','font-size:10px;padding:6px;margin-top:6px','기록 삭제',()=>{
        fbDeleteRecord(r.id);
        S.records=S.records.filter(x=>x.id!==r.id);
        save(); // localStorage에도 반영
        showToast('삭제됨');
        setState({adminExpandRecord:null});
      }));
    }
    lc.appendChild(rc);
  });
  wrap.appendChild(lc);
  return wrap;
}

// ═══════════════════════════════════════════
// START
// ═══════════════════════════════════════════
// 1. 일단 로컬 데이터로 먼저 화면 그리기
render();

// 2. Firebase 로드 완료 후 자동으로 화면 갱신됨 (fbLoadAll 내부에서 _render 호출)
</script>
</body>
